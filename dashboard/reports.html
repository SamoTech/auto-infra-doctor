<!DOCTYPE html>
<html>
<head>
<title>Reports</title>
<style>
body{font-family:Arial;background:#020617;color:#e5e7eb;padding:30px}
.card{background:#111827;padding:15px;margin:10px 0;border-radius:10px}
</style>
</head>
<body>
<h1>Report</h1>
<div id="output"></div>
<script>
const params=new URLSearchParams(location.search);
const id=params.get('id');
const data=JSON.parse(localStorage.getItem('report-'+id)||'{}');
let html='';
(data.issues||[]).forEach(i=>{
 html+=`<div class="card"><strong>${i.severity}</strong><br>${i.message}<br><small>${i.impact}</small><br><code>${i.fix}</code></div>`;
});
document.getElementById('output').innerHTML=html||'No report found';
</script>
</body>
</html>
