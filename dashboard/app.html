<!DOCTYPE html>
<html>
<head>
<title>AutoInfra Doctor App</title>
<style>
body{margin:0;font-family:Inter,Arial;background:#020617;color:#e5e7eb}
.sidebar{width:220px;position:fixed;height:100%;background:#020617;border-right:1px solid #111;padding:20px}
.sidebar h2{color:#22c55e}
.sidebar a{display:block;color:#e5e7eb;margin:10px 0;text-decoration:none}
.main{margin-left:240px;padding:30px}
.card{background:#111827;padding:20px;border-radius:12px;margin-bottom:20px}
textarea{width:100%;height:180px;background:#000;color:#22c55e;padding:10px}
button{background:#22c55e;border:none;padding:10px 20px;margin-top:10px;cursor:pointer}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.critical{background:red}
.high{background:orange}
.medium{background:yellow;color:#000}
.low{background:#444}
</style>
</head>
<body>
<div class="sidebar">
<h2>AID</h2>
<a href="app.html">Analyzer</a>
<a href="reports.html">Reports</a>
<a href="https://github.com/SamoTech/auto-infra-doctor" target="_blank">GitHub</a>
</div>
<div class="main">
<div class="card">
<h3>Analyze Config</h3>
<textarea id="config"></textarea>
<button onclick="analyze()">Analyze</button>
</div>
<div id="results"></div>
</div>
<script>
async function analyze(){
 const config=document.getElementById('config').value;
 const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({config})});
 const data=await res.json();
 const id=Date.now();
 localStorage.setItem('report-'+id,JSON.stringify(data));
 let html='';
 data.issues.forEach(i=>{
  html+=`<div class="card"><span class="badge ${i.severity.toLowerCase()}">${i.severity}</span><br>${i.message}<br><small>${i.impact}</small><br><code>${i.fix}</code></div>`;
 });
 html+=`<a href="reports.html?id=${id}">Share Report</a>`;
 document.getElementById('results').innerHTML=html;
}
</script>
</body>
</html>
