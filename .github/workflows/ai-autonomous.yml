name: AI Autonomous Audit

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

# Explicit permissions — issues:write is required to create/update issues
permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (full — including devDeps for complete audit)
        run: npm ci

      - name: Ensure audit labels exist
        run: |
          gh label create "ai-audit"  --color "0075ca" --description "Automated AI audit report"  --force
          gh label create "automated" --color "e4e669" --description "Generated by GitHub Actions" --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run static audit
        id: audit
        run: |
          echo "## 🤖 AutoInfra Doctor — Automated Audit" > audit-report.md
          echo "" >> audit-report.md
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> audit-report.md
          echo "**Commit:** \`${{ github.sha }}\`" >> audit-report.md
          echo "**Triggered by:** ${{ github.event_name }}" >> audit-report.md
          echo "" >> audit-report.md

          echo "### 📁 Repository Structure Check" >> audit-report.md

          # Check for critical files
          files=("api/analyze.js" "src/rules/mikrotik.js" "src/engine.js" "src/validator.js" "vercel.json" "package.json")
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "- ✅ \`$f\` exists" >> audit-report.md
            else
              echo "- ❌ \`$f\` **MISSING**" >> audit-report.md
            fi
          done

          echo "" >> audit-report.md
          echo "### 🔐 Security Pattern Scan" >> audit-report.md

          # localStorage check
          if grep -r "localStorage" dashboard/ index.html 2>/dev/null | grep -q .; then
            echo "- ⚠️ **localStorage detected** — may silently fail in sandboxed iframe contexts" >> audit-report.md
          else
            echo "- ✅ No localStorage usage found" >> audit-report.md
          fi

          # innerHTML check
          if grep -r "innerHTML" dashboard/ index.html 2>/dev/null | grep -q .; then
            ESCAPED=$(grep -r "escapeHtml\|textContent" dashboard/ index.html 2>/dev/null | wc -l)
            if [ "$ESCAPED" -gt "0" ]; then
              echo "- ✅ innerHTML present but escapeHtml/textContent guards detected" >> audit-report.md
            else
              echo "- ⚠️ **innerHTML usage without escapeHtml** detected — XSS risk" >> audit-report.md
            fi
          else
            echo "- ✅ No raw innerHTML usage found" >> audit-report.md
          fi

          # Rate limiting check
          if grep -q "rate\|RATE\|rateLimit\|429" api/analyze.js 2>/dev/null; then
            echo "- ✅ Rate limiting present in API handler" >> audit-report.md
          else
            echo "- ❌ **No rate limiting** detected in \`api/analyze.js\`" >> audit-report.md
          fi

          # Input validation check
          if grep -q "validator\|validateConfig\|config.length" api/analyze.js 2>/dev/null; then
            echo "- ✅ Input validation present in API handler" >> audit-report.md
          else
            echo "- ❌ **No input validation** detected in \`api/analyze.js\`" >> audit-report.md
          fi

          # Workflow permissions check
          if grep -q "permissions" .github/workflows/*.yml 2>/dev/null; then
            echo "- ✅ Workflow permissions are explicitly scoped" >> audit-report.md
          else
            echo "- ⚠️ **No explicit permissions** block in workflow files" >> audit-report.md
          fi

          echo "" >> audit-report.md
          echo "### 📦 Dependency Audit" >> audit-report.md
          npm audit --audit-level=moderate --json 2>/dev/null | node -e "
            const chunks = [];
            process.stdin.on('data', d => chunks.push(d));
            process.stdin.on('end', () => {
              try {
                const data = JSON.parse(chunks.join(''));
                const vulns = data.metadata?.vulnerabilities || {};
                const total = (vulns.critical||0)+(vulns.high||0)+(vulns.moderate||0);
                if (total === 0) {
                  console.log('- \u2705 No moderate/high/critical vulnerabilities found');
                } else {
                  if (vulns.critical) console.log(\`- \ud83d\udd34 **\${vulns.critical} critical** vulnerabilities\`);
                  if (vulns.high)     console.log(\`- \ud83d\udfe0 **\${vulns.high} high** vulnerabilities\`);
                  if (vulns.moderate) console.log(\`- \ud83d\udfe1 **\${vulns.moderate} moderate** vulnerabilities\`);
                }
              } catch { console.log('- \u2139\ufe0f Could not parse npm audit output'); }
            });
          " >> audit-report.md

          echo "" >> audit-report.md
          echo "### 📏 Code Size" >> audit-report.md
          echo "| File | Lines |" >> audit-report.md
          echo "|---|---|" >> audit-report.md
          src_files=("api/analyze.js" "src/engine.js" "src/validator.js" "src/rules/mikrotik.js" "src/rules/firewall.js" "bin/cli.js")
          for f in "${src_files[@]}"; do
            if [ -f "$f" ]; then
              lines=$(wc -l < "$f")
              echo "| \`$f\` | $lines |" >> audit-report.md
            fi
          done

          echo "" >> audit-report.md
          echo "### 🧪 Test Coverage" >> audit-report.md
          TEST_COUNT=$(find tests -name '*.test.*' 2>/dev/null | wc -l || echo 0)
          if [ "$TEST_COUNT" -gt "0" ]; then
            echo "- ✅ $TEST_COUNT test file(s) found" >> audit-report.md
          else
            echo "- ⚠️ No test files found in \`tests/\` — add unit tests for rule modules" >> audit-report.md
          fi

          echo "" >> audit-report.md
          echo "---" >> audit-report.md
          echo "_Auto-generated by CI audit workflow. [View repo](https://github.com/SamoTech/auto-infra-doctor)_" >> audit-report.md

          cat audit-report.md

      - name: Create or update audit issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🤖 Automated AI Audit Report"
          content-filepath: ./audit-report.md
          labels: ai-audit, automated
          update-existing: true
          token: ${{ secrets.GITHUB_TOKEN }}
