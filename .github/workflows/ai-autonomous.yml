name: AI Autonomous Audit

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

# Explicit permissions — issues:write is required to create/update issues
permissions:
  contents: read
  issues: write

# Force Node.js 24 to avoid deprecation warnings (mandatory from June 2, 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run static audit
        id: audit
        run: |
          echo "## 🤖 AutoInfra Doctor — Automated Audit" > audit-report.md
          echo "" >> audit-report.md
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> audit-report.md
          echo "**Commit:** \`${{ github.sha }}\`" >> audit-report.md
          echo "**Triggered by:** ${{ github.event_name }}" >> audit-report.md
          echo "" >> audit-report.md

          echo "### 📁 Repository Structure Check" >> audit-report.md

          # Check for critical files
          files=("api/analyze.js" "src/rules/mikrotik.js" "vercel.json" "package.json")
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "- ✅ \`$f\` exists" >> audit-report.md
            else
              echo "- ❌ \`$f\` **MISSING**" >> audit-report.md
            fi
          done

          echo "" >> audit-report.md
          echo "### 🔐 Security Pattern Scan" >> audit-report.md

          # Scan for known risky patterns in source files
          if grep -r "localStorage" dashboard/ 2>/dev/null | grep -q .; then
            echo "- ⚠️ **localStorage detected** in \`dashboard/\` — may silently fail in sandboxed environments" >> audit-report.md
          fi

          if grep -r "innerHTML" dashboard/ 2>/dev/null | grep -q .; then
            echo "- ⚠️ **innerHTML usage detected** in \`dashboard/\` — verify all interpolated values are escaped (XSS risk)" >> audit-report.md
          fi

          if ! grep -q "rate" api/analyze.js 2>/dev/null; then
            echo "- ❌ **No rate limiting** detected in \`api/analyze.js\`" >> audit-report.md
          else
            echo "- ✅ Rate limiting present in API" >> audit-report.md
          fi

          if ! grep -q "permissions" .github/workflows/*.yml 2>/dev/null; then
            echo "- ⚠️ **No explicit permissions** block in workflow files — uses overly broad defaults" >> audit-report.md
          else
            echo "- ✅ Workflow permissions are explicitly scoped" >> audit-report.md
          fi

          echo "" >> audit-report.md
          echo "### 📦 Dependency Audit" >> audit-report.md
          npm audit --audit-level=moderate --json 2>/dev/null | node -e "
            const chunks = [];
            process.stdin.on('data', d => chunks.push(d));
            process.stdin.on('end', () => {
              try {
                const data = JSON.parse(chunks.join(''));
                const vulns = data.metadata?.vulnerabilities || {};
                const total = (vulns.critical||0)+(vulns.high||0)+(vulns.moderate||0);
                if (total === 0) {
                  console.log('- ✅ No moderate/high/critical vulnerabilities found');
                } else {
                  if (vulns.critical) console.log(\`- 🔴 **\${vulns.critical} critical** vulnerabilities\`);
                  if (vulns.high) console.log(\`- 🟠 **\${vulns.high} high** vulnerabilities\`);
                  if (vulns.moderate) console.log(\`- 🟡 **\${vulns.moderate} moderate** vulnerabilities\`);
                }
              } catch { console.log('- ℹ️ Could not parse npm audit output'); }
            });
          " >> audit-report.md

          echo "" >> audit-report.md
          echo "### 📏 Code Size" >> audit-report.md
          echo "| File | Lines |" >> audit-report.md
          echo "|---|---|" >> audit-report.md
          for f in api/analyze.js src/rules/mikrotik.js src/analyzer.js; do
            if [ -f "$f" ]; then
              lines=$(wc -l < "$f")
              echo "| \`$f\` | $lines |" >> audit-report.md
            fi
          done

          echo "" >> audit-report.md
          echo "---" >> audit-report.md
          echo "_This report is auto-generated by the CI audit workflow. [View repo](https://github.com/SamoTech/auto-infra-doctor)_" >> audit-report.md

          cat audit-report.md

      - name: Create or update audit issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🤖 Automated AI Audit Report — ${{ github.run_number }}"
          content-filepath: ./audit-report.md
          labels: ai-audit, automated
          token: ${{ secrets.GITHUB_TOKEN }}
