name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (npm pack, no publish)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Publish to npm registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if test suite exists)
        run: |
          TEST_COUNT=$(find tests -name '*.test.*' 2>/dev/null | wc -l || echo 0)
          if [ "$TEST_COUNT" -gt "0" ]; then
            echo "Found $TEST_COUNT test file(s) — running test suite"
            npm test
          else
            echo "No test files found in tests/ — skipping test step"
          fi

      - name: Check NPM_TOKEN is configured
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "❌ NPM_TOKEN secret is not set."
            exit 1
          fi
          echo "✅ NPM_TOKEN is configured"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify package contents (dry run)
        run: |
          echo "=== Files that will be published ==="
          npm pack --dry-run

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Print published version
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "✅ Published: ${PKG_NAME}@${PKG_VER}"
          echo "   View at: https://www.npmjs.com/package/${PKG_NAME}"
