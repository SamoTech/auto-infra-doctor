name: Publish to npm

# Triggers on any tag pushed as v* (e.g. v1.2.0, v2.0.0)
on:
  push:
    tags:
      - 'v*'

# Also allows manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (npm pack, no publish)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Publish to npm registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node with npm registry auth
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run tests before publishing
      - name: Run tests
        run: npm test
        continue-on-error: false

      # 5. Verify package contents (always runs)
      - name: Verify package contents (dry run)
        run: npm pack --dry-run

      # 6. Publish (skipped if dry_run input is true)
      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 7. Summary
      - name: Print published version
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "Published: $(node -p \"require('./package.json').name\")@$(node -p \"require('./package.json').version\")"
          echo "View at: https://www.npmjs.com/package/$(node -p \"require('./package.json').name\")"
